x-acceptance: &acceptance
  image: oven/bun:alpine
  volumes:
    - .:/src
  working_dir: /src
  tty: true
  environment:
    CACHE_HOST: cache
    RABBIT_HOST: rabbitmq
    DATABASE_URL: "postgresql://dev:admin123@db:5432/fragment-composer?schema=public"
  env_file:
    - path: .env.development
  ports:
    - 3001:3001

x-fragment-composer-base: &fragment-composer-base
  tty: true
  environment:
    CACHE_HOST: cache
    RABBIT_HOST: rabbitmq
    DATABASE_URL: "postgresql://dev:admin123@db:5432/fragment-composer?schema=public"
  env_file:
    - path: .env.development
  ports:
    - ${API_PORT:-3000}:3000

x-fragment-composer-dev: &fragment-composer-dev
  <<: *fragment-composer-base
  depends_on:
    rabbitmq:
      condition: service_healthy
    cache:
      condition: service_started
    db-migration:
      condition: service_completed_successfully
  networks:
    - default

x-fragment-composer-shared: &fragment-composer-shared
  <<: *fragment-composer-base
  networks:
    - platform

services:
  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq:/var/lib/rabbitmq/data
      - rabbitmq:/var/log/rabbitmq/log
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:-guest}
      RABBITMQ_DEFAULT_PASSWORD: ${RABBIT_password:-guest}
    env_file:
      - path: .env.development
    ports:
      - ${RABBIT_PORT:-5672}:5672
      - 15672:15672
    profiles: [dev, local]

  cache:
    image: valkey/valkey
    restart: always
    command: >
      valkey-server --save "" --appendonly no
      --notify-keyspace-events Ex
      --loglevel notice
      --requirepass admin123
    volumes:
      - cache:/data
    env_file:
      - path: .env.development
    ports:
      - ${CACHE_PORT:-6379}:6379
    profiles: [dev, local]

  db:
    image: postgres:latest
    restart: always
    shm_size: 128mb
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER
      interval: 20s
      timeout: 5s
      retries: 6
    environment:
      DATABASE_URL: "postgresql://dev:admin123@db:5432/fragment-composer?schema=public"
      POSTGRES_USER: ${DATABASE_USERNAME:-dev}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-admin123}
      POSTGRES_DB: ${DATABASE_DB:-fragment-composer}
    env_file:
      - path: .env.development
    ports:
      - ${DATABASE_PORT:-5432}:5432
    profiles: [dev, local]

  db-migration:
    image: oven/bun:alpine
    volumes:
      - .:/src
    working_dir: /src
    command: |
      sh -c "
        echo 'Running db migration...'
        export DATABASE_URL='postgresql://dev:admin123@db:5432/fragment-composer?schema=public'
        bunx prisma migrate deploy
      "
    depends_on:
      db:
        condition: service_healthy
    tty: true
    environment:
      DATABASE_URL: "postgresql://dev:admin123@db:5432/fragment-composer?schema=public"
    env_file:
      - path: .env.development
    profiles:
      - local
      - dev
      - test

  local:
    <<: *fragment-composer-dev
    build:
      context: .
    profiles:
      - local
      - test

  worker-local:
    <<: *fragment-composer-dev
    build:
      context: .
    environment:
      DEPLOYMENT_MODE: worker
    profiles:
      - local
      - test

  dev:
    <<: *fragment-composer-dev
    image: oven/bun:alpine
    volumes:
      - .:/src
    working_dir: /src
    command: |
      sh -c "
        if [ ! -d node_modules ]; then
          bun install --frozen-lockfile --ignore-scripts
        fi
        bun run prisma:generate
        bun run dev
      "
    profiles:
      - dev

  worker:
    <<: *fragment-composer-dev
    image: oven/bun:alpine
    volumes:
      - .:/src
    working_dir: /src
    ports: []
    environment:
      DEPLOYMENT_MODE: worker
    command: |
      sh -c "
        if [ ! -d node_modules ]; then
          bun install --frozen-lockfile --ignore-scripts
        fi
        bun run prisma:generate
        bun run dev
      "
    profiles:
      - dev

  shared:
    <<: *fragment-composer-shared
    image: oven/bun:alpine
    volumes:
      - .:/src
    working_dir: /src
    command: |
      sh -c "
        if [ ! -d node_modules ]; then
          bun install --frozen-lockfile --ignore-scripts
        fi
        echo 'Waiting for dependencies...'
        until nc -z rabbitmq 5672 2>/dev/null; do echo 'Waiting for rabbitmq:5672...'; sleep 1; done
        until nc -z cache 6379 2>/dev/null; do echo 'Waiting for cache:6379...'; sleep 1; done
        until nc -z db 5432 2>/dev/null; do echo 'Waiting for db:5432...'; sleep 1; done
        echo 'All dependencies available, starting...'
        bun run prisma:generate
        bun run dev
      "
    profiles:
      - shared

  worker-shared:
    <<: *fragment-composer-shared
    image: oven/bun:alpine
    volumes:
      - .:/src
    working_dir: /src
    ports: []
    environment:
      DEPLOYMENT_MODE: worker
    command: |
      sh -c "
        if [ ! -d node_modules ]; then
          bun install --frozen-lockfile --ignore-scripts
        fi
        echo 'Waiting for dependencies...'
        until nc -z rabbitmq 5672 2>/dev/null; do echo 'Waiting for rabbitmq:5672...'; sleep 1; done
        until nc -z cache 6379 2>/dev/null; do echo 'Waiting for cache:6379...'; sleep 1; done
        until nc -z db 5432 2>/dev/null; do echo 'Waiting for db:5432...'; sleep 1; done
        echo 'All dependencies available, starting...'
        bun run prisma:generate
        bun run dev
      "
    profiles:
      - shared

  acceptance:
    <<: *acceptance
    depends_on:
      rabbitmq:
        condition: service_healthy
      cache:
        condition: service_started
      db-migration:
        condition: service_completed_successfully
    command: |
      sh -c "
        if [ ! -d node_modules ]; then
          bun install --frozen-lockfile --ignore-scripts
        fi
        sleep infinity
      "
    profiles:
      - local
      - dev

  acceptance-once:
    <<: *acceptance
    depends_on:
      rabbitmq:
        condition: service_healthy
      cache:
        condition: service_started
      db-migration:
        condition: service_completed_successfully
    command: |
      sh -c "
        if [ ! -d node_modules ]; then
          bun install --frozen-lockfile --ignore-scripts
        fi
        bun run test:acceptance
      "
    profiles:
      - test

volumes:
  rabbitmq:
  cache:
  postgres-data:

networks:
  platform:
    external: true
    name: platform
